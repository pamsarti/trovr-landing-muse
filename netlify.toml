# Netlify deploy config — static site.
# The build prerenders every route to static HTML in dist/client; Netlify serves
# it straight from the CDN (no server functions, no backend). Forms are handled
# by Netlify Forms (see public/__forms.html for the detected form definitions).
[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  # Vite 7 needs Node >= 20.19; pin to a Netlify-supported LTS.
  NODE_VERSION = "22"
