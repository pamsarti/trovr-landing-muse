name: Trigger Netlify deploy

# Fires the Netlify build hook on every push to `main`, so a deploy happens
# without opening Netlify. The build hook triggers a build of whatever branch
# the hook is configured for in Netlify (set it to `main` when you create it).
#
# Setup (one time, on GitHub):
#   Repo → Settings → Secrets and variables → Actions → New repository secret
#     Name:  NETLIFY_BUILD_HOOK
#     Value: https://api.netlify.com/build_hooks/xxxxxxxxxxxxxxxx
#
# The hook URL is a secret (anyone with it can trigger builds), so it lives in
# the GitHub secret — never hardcode it in this file.

on:
  push:
    branches: [main]
  # Allow triggering a deploy by hand from the Actions tab too.
  workflow_dispatch: {}

# If several pushes land quickly, cancel superseded runs so only the latest
# commit triggers a deploy.
concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  trigger-netlify:
    runs-on: ubuntu-latest
    steps:
      - name: POST Netlify build hook
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -z "${NETLIFY_BUILD_HOOK}" ]; then
            echo "::error::NETLIFY_BUILD_HOOK secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

          echo "Triggering Netlify deploy for commit ${GITHUB_SHA}..."
          http_code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST \
            -H 'Content-Type: application/json' \
            -d "{\"trigger_title\":\"GitHub push ${GITHUB_SHA}\"}" \
            "${NETLIFY_BUILD_HOOK}")

          echo "Netlify responded with HTTP ${http_code}"
          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::Netlify build hook returned HTTP ${http_code}"
            exit 1
          fi
          echo "Deploy triggered successfully."
