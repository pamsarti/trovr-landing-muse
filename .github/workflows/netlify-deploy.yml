name: Trigger Netlify deploy

# Netlify's free plan only auto-builds commits authored by team members,
# so pushes from the Lovable bot get skipped. This workflow runs for every
# push to `main` regardless of author and fires a Netlify build hook,
# which bypasses the author check.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Call Netlify build hook
        run: curl -fsSL -X POST -d {} "$NETLIFY_BUILD_HOOK_URL"
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}